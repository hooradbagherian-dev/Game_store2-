<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAMING | فروشگاه آنلاین عمومی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-green: #00ff88;
            --accent-pink: #ff0055;
            --accent-blue: #00d2ff;
            --text-color: #c5c6c7;
            --glow-green: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: #fff; padding-bottom: 50px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: #12141d; border-bottom: 2px solid var(--accent-green);
            position: sticky; top: 0; z-index: 90;
        }

        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent-green); }
        .header-actions { display: flex; gap: 15px; align-items: center; }

        .nav-btn {
            background: #222c36; color: var(--accent-blue); border: 1px solid var(--accent-blue);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;
        }

        .cart-icon { position: relative; font-size: 20px; cursor: pointer; color: var(--accent-green); }
        #cart-count {
            position: absolute; top: -8px; right: -10px; background: var(--accent-pink);
            color: #fff; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 50%;
        }

        .page-section { display: none; padding: 20px; }
        .page-section.active { display: block; }

        .search-box {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
            background: #12141d; color: #fff; margin-bottom: 20px; outline: none;
        }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-card {
            background: var(--card-bg); border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid #2c3531; transition: 0.3s;
        }
        .product-card:hover { border-color: var(--accent-green); box-shadow: var(--glow-green); }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .product-card h3 { font-size: 14px; margin-bottom: 4px; }
        .product-card .desc { font-size: 11px; color: #888; margin-bottom: 8px; line-height: 1.3; }
        .product-card .price { color: var(--accent-green); font-weight: bold; font-size: 13px; margin-bottom: 10px; }

        .add-btn { background: var(--accent-green); color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }

        .admin-container { max-width: 500px; margin: 0 auto; background: #12141d; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .login-box { text-align: center; padding: 20px 10px; }
        .login-box i { font-size: 40px; color: var(--accent-blue); margin-bottom: 15px; }

        .admin-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .admin-form label { font-size: 12px; color: var(--accent-green); font-weight: bold; }
        .admin-form input, .admin-form textarea { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #1f2833; color: #fff; outline: none; }

        .file-input-wrapper { background: #1f2833; padding: 10px; border-radius: 6px; border: 1px dashed var(--accent-blue); text-align: center; cursor: pointer; }
        .image-preview { max-width: 100%; height: 100px; object-fit: cover; border-radius: 6px; margin-top: 10px; display: none; }
        
        .submit-btn { background: var(--accent-blue); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .logout-btn { background: var(--accent-pink); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 15px; }

        .admin-item { display: flex; align-items: center; justify-content: space-between; background: #1f2833; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .admin-item img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
        .admin-item-info { flex: 1; margin: 0 10px; font-size: 12px; }
        .delete-btn { background: var(--accent-pink); color: #fff; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }

        .cart-modal { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #12141d; box-shadow: 5px 0 20px rgba(0,0,0,0.8); padding: 20px; transition: 0.3s ease; z-index: 100; display: flex; flex-direction: column; }
        .cart-modal.active { left: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .cart-items { flex: 1; overflow-y: auto; list-style: none; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #1f2833; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
        .quantity-btn { background: #333; color: #fff; border: none; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; }
        .checkout-btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS<span>GAMING</span></div>
        <div class="header-actions">
            <button class="nav-btn" id="toggle-view-btn" onclick="toggleView()">
                <i class="fas fa-lock"></i> ورود به پنل
            </button>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <div id="shop-view" class="page-section active">
        <input type="text" id="search-input" class="search-box" placeholder="جستجوی محصول..." oninput="filterProducts()">
        <div class="products-grid" id="product-list"></div>
    </div>

    <div id="admin-view" class="page-section">
        <div class="admin-container">
            <div id="login-section" class="login-box">
                <i class="fas fa-user-shield"></i>
                <h3 style="margin-bottom: 15px;">ورود مدیر سیستم</h3>
                <form onsubmit="handleLogin(event)" class="admin-form">
                    <input type="password" id="admin-pass" placeholder="رمز عبور (admin123)" required>
                    <button type="submit" class="submit-btn">ورود به پنل</button>
                </form>
            </div>

            <div id="dashboard-section" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="color: var(--accent-blue);">مدیریت محصولات</h2>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>

                <form class="admin-form" onsubmit="handleAddProduct(event)">
                    <label>نام محصول:</label>
                    <input type="text" id="p-name" placeholder="مثلاً: دسته بازی PS5" required>

                    <label>قیمت (تومان):</label>
                    <input type="number" id="p-price" placeholder="مثلاً: 3500000" required>

                    <label>انتخاب تصویر از گالری:</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="p-file" accept="image/*" onchange="previewImage(event)" required>
                    </div>
                    <img id="img-preview" class="image-preview" alt="پیش‌نمایش">

                    <label>مشخصات و توضیحات:</label>
                    <textarea id="p-desc" rows="3" placeholder="توضیحات..." required></textarea>

                    <button type="submit" class="submit-btn" id="save-btn"><i class="fas fa-plus"></i> ثبت محصول</button>
                </form>

                <h3 style="margin-bottom: 10px;">محصولات ثبت‌شده</h3>
                <div id="admin-product-list"></div>
            </div>
        </div>
    </div>

    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h3>سبد خرید</h3>
            <i class="fas fa-times" style="cursor: pointer; color: var(--accent-pink);" onclick="toggleCart()"></i>
        </div>
        <ul class="cart-items" id="cart-items"></ul>
        <div style="margin-top: 15px; font-weight: bold;">
            مجموع: <span id="total-price" style="color: var(--accent-green);">۰</span> تومان
        </div>
        <button class="checkout-btn" onclick="checkout()">تکمیل سفارش</button>
    </div>

    <script>
        const STORAGE_KEY = "nexus_store_products_local";
        const ADMIN_PASSWORD = "admin123";
        
        let isLoggedIn = localStorage.getItem('is_admin_logged_in') === 'true';
        let currentBase64Image = "";
        let products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let cart = JSON.parse(localStorage.getItem('cart_items')) || [];

        function renderProducts(itemsToRender = products) {
            const list = document.getElementById('product-list');
            if (itemsToRender.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center; grid-column: 1/-1;">هیچ محصولی وجود ندارد. از پنل مدیریت اولین محصول را اضافه کنید.</p>';
                return;
            }
            list.innerHTML = itemsToRender.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="desc">${p.desc}</div>
                    <div class="price">${Number(p.price).toLocaleString('fa-IR')} تومان</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">افزودن به سبد</button>
                </div>
            `).join('');
        }

        function renderAdminProducts() {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = products.map(p => `
                <div class="admin-item">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="admin-item-info">
                        <strong>${p.name}</strong>
                        <div style="color: var(--accent-green);">${Number(p.price).toLocaleString('fa-IR')} تومان</div>
                    </div>
                    <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const img = new Image();
                const reader = new FileReader();
                reader.onload = function(e) {
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 300;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        currentBase64Image = canvas.toDataURL('image/jpeg', 0.5);
                        const imgPreview = document.getElementById('img-preview');
                        imgPreview.src = currentBase64Image;
                        imgPreview.style.display = 'block';
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function handleAddProduct(event) {
            event.preventDefault();
            if (!currentBase64Image) {
                alert('لطفاً یک تصویر انتخاب کنید!');
                return;
            }

            const newProduct = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                img: currentBase64Image,
                desc: document.getElementById('p-desc').value
            };

            products.push(newProduct);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            
            alert('محصول با موفقیت اضافه شد!');
            renderProducts();
            renderAdminProducts();

            event.target.reset();
            currentBase64Image = "";
            document.getElementById('img-preview').style.display = 'none';
        }

        function deleteProduct(id) {
            if (confirm('آیا از حذف این محصول اطمینان دارید؟')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                renderProducts();
                renderAdminProducts();
            }
        }

        function checkAuthStatus() {
            const loginSec = document.getElementById('login-section');
            const dashSec = document.getElementById('dashboard-section');
            if (isLoggedIn) { loginSec.style.display = 'none'; dashSec.style.display = 'block'; }
            else { loginSec.style.display = 'block'; dashSec.style.display = 'none'; }
        }

        function handleLogin(event) {
            event.preventDefault();
            if (document.getElementById('admin-pass').value === ADMIN_PASSWORD) {
                isLoggedIn = true;
                localStorage.setItem('is_admin_logged_in', 'true');
                checkAuthStatus();
                document.getElementById('admin-pass').value = '';
            } else { alert('رمز عبور اشتباه است!'); }
        }

        function logout() { isLoggedIn = false; localStorage.setItem('is_admin_logged_in', 'false'); checkAuthStatus(); }
        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query)));
        }

        function addToCart(id) {
            const item = cart.find(x => x.id === id);
            if (item) item.qty++;
            else {
                const p = products.find(x => x.id === id);
                cart.push({ ...p, qty: 1 });
            }
            saveCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
            }
            saveCart();
        }

        function saveCart() { localStorage.setItem('cart_items', JSON.stringify(cart)); updateCartUI(); }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((acc, curr) => acc + curr.qty, 0);
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <li class="cart-item">
                        <div>
                            <div>${item.name}</div>
                            <div style="color: var(--accent-green)">${Number(item.price).toLocaleString('fa-IR')}</div>
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <button class="quantity-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            <span>${item.qty}</span>
                            <button class="quantity-btn" onclick="changeQty(${item.id}, -1)">-</button>
                        </div>
                    </li>
                `;
            }).join('');
            document.getElementById('total-price').innerText = total.toLocaleString('fa-IR');
        }

        function toggleView() {
            const shop = document.getElementById('shop-view');
            const admin = document.getElementById('admin-view');
            const btn = document.getElementById('toggle-view-btn');
            if (shop.classList.contains('active')) {
                shop.classList.remove('active'); admin.classList.add('active');
                btn.innerHTML = '<i class="fas fa-store"></i> مشاهده فروشگاه'; checkAuthStatus();
            } else {
                admin.classList.remove('active'); shop.classList.add('active');
                btn.innerHTML = '<i class="fas fa-lock"></i> ورود به پنل';
            }
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('active'); }
        function checkout() { alert('سفارش ثبت شد!'); cart = []; saveCart(); toggleCart(); }

        renderProducts();
        renderAdminProducts();
        updateCartUI();
    </script>
</body>
</html>
